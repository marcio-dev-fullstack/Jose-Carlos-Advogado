<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dr. José Carlos Alves da Costa</title>

  <!-- Favicon -->
  <link rel="icon" href="favicon.png" type="image/png">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    /* LOGO */
    .logo {
      white-space: nowrap;
      display: inline-block;
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
      text-decoration: none;
      color: #000;
    }

    /* NOME */
    h1 {
      margin-top: 20px;
      font-size: 28px;
    }

    /* FOTO */
    .foto-perfil {
      display: block;
      margin: 20px auto;
      max-width: 250px;
      border-radius: 8px;
    }

    /* ENDEREÇO */
    .endereco {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin: 20px;
      font-size: 16px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .endereco {
        white-space: normal;
        overflow: visible;
        text-overflow: unset;
        font-size: 14px;
      }

      .foto-perfil {
        max-width: 90%;
      }

      .logo {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <!-- LOGO -->
  <a href="#" class="logo">
    <span>J. Carlos</span> Advocacia
  </a>

  <!-- NOME -->
  <h1>Dr. José Carlos Alves da Costa</h1>

  <!-- FOTO -->
  <img src="foto1.jpeg" class="foto-perfil" alt="Dr. José Carlos">

  <!-- ENDEREÇO -->
  <p class="endereco">
    Rua Um, Nº 1.281, Bairro Centro, Floresta do Araguaia - PA
  </p>

</body>
</html>
